name: Branch Tracker

on:
  create:
  delete:
  push:
    branches-ignore:
      - master
      - main
  pull_request:
    types: [opened, closed, merged]

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout meta branch
        uses: actions/checkout@v4
        with:
          ref: meta
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update branch log
        uses: actions/github-script@v7
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_TYPE: ${{ github.ref_type }}
          ACTOR: ${{ github.actor }}
          PR_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'BRANCHES.md';
            const now = new Date().toISOString().split('T')[0];
            const actor = process.env.ACTOR;
            const event = process.env.EVENT_NAME;
            const ref = process.env.REF?.replace('refs/heads/', '');
            const refType = process.env.REF_TYPE;

            // Load or initialise the log
            let content = '';
            if (fs.existsSync(path)) {
              content = fs.readFileSync(path, 'utf8');
            } else {
              content = `# Branch Tracker\n\nFull history of every branch created, updated, and merged in this repo.\n\n| Date | Branch | Event | Actor | PR | Notes |\n|------|--------|-------|-------|----|-------|\n`;
            }

            let row = '';

            if (event === 'create' && refType === 'branch') {
              row = `| ${now} | \`${ref}\` | ✅ Created | @${actor} | — | — |\n`;
            } else if (event === 'delete' && refType === 'branch') {
              row = `| ${now} | \`${ref}\` | 🗑️ Deleted | @${actor} | — | — |\n`;
            } else if (event === 'push') {
              row = `| ${now} | \`${ref}\` | 📤 Pushed | @${actor} | — | — |\n`;
            } else if (event === 'pull_request') {
              const prNum = process.env.PR_NUMBER;
              const prTitle = process.env.PR_TITLE;
              const prBranch = process.env.PR_BRANCH;
              const prMerged = process.env.PR_MERGED === 'true';
              const prUrl = process.env.PR_URL;
              const action = process.env.PR_ACTION;

              if (action === 'opened') {
                row = `| ${now} | \`${prBranch}\` | 🔀 PR Opened | @${actor} | [#${prNum}](${prUrl}) | ${prTitle} |\n`;
              } else if (action === 'closed' && prMerged) {
                row = `| ${now} | \`${prBranch}\` | 🚀 Merged | @${actor} | [#${prNum}](${prUrl}) | ${prTitle} |\n`;
              } else if (action === 'closed' && !prMerged) {
                row = `| ${now} | \`${prBranch}\` | ❌ PR Closed | @${actor} | [#${prNum}](${prUrl}) | ${prTitle} |\n`;
              }
            }

            if (row) {
              // Insert after the header row (find the table separator line)
              const insertAfter = '|------|--------|-------|-------|----|-------|\n';
              content = content.replace(insertAfter, insertAfter + row);
              fs.writeFileSync(path, content);
              console.log('Branch log updated:', row.trim());
            }

      - name: Commit branch log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BRANCHES.md
          git diff --cached --quiet || git commit -m "chore: update branch tracker [skip ci]"
          git push
