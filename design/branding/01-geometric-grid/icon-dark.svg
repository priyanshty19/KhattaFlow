<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- myFinGrid · Concept 1 — Minimal geometric grid (ascending nodes) · DARK -->
  <defs>
    <linearGradient id="g1d" x1="14" y1="50" x2="50" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- 3x3 lattice (faint) -->
  <g fill="#e4e4e7" opacity="0.16">
    <circle cx="14" cy="14" r="2"/><circle cx="32" cy="14" r="2"/><circle cx="50" cy="14" r="2"/>
    <circle cx="14" cy="32" r="2"/><circle cx="32" cy="32" r="2"/><circle cx="50" cy="32" r="2"/>
    <circle cx="14" cy="50" r="2"/><circle cx="32" cy="50" r="2"/><circle cx="50" cy="50" r="2"/>
  </g>
  <!-- ascending connection -->
  <path d="M14 50 L32 32 L50 14" stroke="url(#g1d)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- active nodes climbing the grid -->
  <g fill="url(#g1d)">
    <circle cx="14" cy="50" r="4.5"/><circle cx="32" cy="32" r="4.5"/><circle cx="50" cy="14" r="4.5"/>
  </g>
</svg>
