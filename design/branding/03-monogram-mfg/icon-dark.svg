<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- myFinGrid · Concept 3 — Monogram M+F+G · DARK -->
  <!-- M = the rising twin peaks · F = the crossbar arm · G = the hooked right terminal -->
  <defs>
    <linearGradient id="g3d" x1="12" y1="50" x2="52" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <g stroke="url(#g3d)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- M body -->
    <path d="M14 50 L14 18 L32 34 L50 18"/>
    <!-- G terminal: right stem dips then hooks inward -->
    <path d="M50 18 L50 44 L38 44"/>
  </g>
  <!-- F arm crossing the left stem -->
  <rect x="14" y="29" width="14" height="5" rx="2.5" fill="url(#g3d)"/>
</svg>
