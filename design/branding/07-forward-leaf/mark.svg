<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- myFinGrid · Concept 7 "Forward Leaf" — purple→blue forward triangle + green→teal growth flame, offset on the diagonal. Transparent background. -->
  <defs>
    <linearGradient id="fl-purple" x1="330" y1="380" x2="560" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#3b6ef5"/>
    </linearGradient>
    <linearGradient id="fl-green" x1="730" y1="170" x2="640" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ade80"/>
      <stop offset="1" stop-color="#1fc7b6"/>
    </linearGradient>
  </defs>
  <!-- forward triangle (play / momentum), tilted up-right -->
  <g transform="rotate(-9 470 560)">
    <path d="M330 390 L330 730 L600 560 Z"
          fill="url(#fl-purple)" stroke="url(#fl-purple)" stroke-width="58"
          stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <!-- growth flame (leaf / ascent), upper-right -->
  <path d="M724 182 C832 286 820 416 662 476 C654 384 646 276 724 182 Z"
        fill="url(#fl-green)" stroke="url(#fl-green)" stroke-width="20"
        stroke-linejoin="round" stroke-linecap="round"/>
</svg>
